<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPDB Online - Aplikasi Sekolahku</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .bg-header-custom { background-color: #4a4a4a; }
        .text-orange { color: #f39c12; }
    </style>
</head>
<body class="bg-light">

    <header class="bg-header-custom text-white py-3 mb-4 shadow-sm">
        <div class="container d-flex justify-content-between align-items-center">
            <h3 class="text-orange fw-bold m-0">PPDB ONLINE 2026/2027</h3>
            <a href="index.html" class="btn btn-outline-light btn-sm">Kembali ke Beranda</a>
        </div>
    </header>

    <div class="container mb-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-dark text-white fw-bold">
                        Formulir Pendaftaran Siswa Baru
                    </div>
                    <div class="card-body p-4">
                        <form id="form-ppdb">
                            
                            <h5 class="border-bottom pb-2 mb-3">A. Data Pribadi Siswa</h5>
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold">Nama Lengkap</label>
                                <input type="text" class="form-control" id="nama-siswa" placeholder="Masukkan nama lengkap sesuai ijazah" required>
                            </div>
                            
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">NISN</label>
                                    <input type="number" class="form-control" id="nisn-siswa" placeholder="Nomor Induk Siswa Nasional" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Jenis Kelamin</label>
                                    <select class="form-select" id="gender-siswa" required>
                                        <option value="" selected disabled>Pilih...</option>
                                        <option value="Laki-laki">Laki-laki</option>
                                        <option value="Perempuan">Perempuan</option>
                                    </select>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Tempat, Tanggal Lahir</label>
                                <div class="input-group">
                                    <input type="text" class="form-control" id="tempat-lahir" placeholder="Tempat Lahir" required>
                                    <input type="date" class="form-control" id="tanggal-lahir" required>
                                </div>
                            </div>

                            <h5 class="border-bottom pb-2 mt-4 mb-3">B. Data Kontak & Alamat</h5>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Alamat Lengkap</label>
                                <textarea class="form-control" id="alamat-siswa" rows="3" placeholder="Nama jalan, RT/RW, Desa/Kelurahan..." required></textarea>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold">Nomor WhatsApp (Aktif)</label>
                                <input type="number" class="form-control" id="wa-siswa" placeholder="Contoh: 08123456789" required>
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-warning fw-bold btn-lg">Kirim Data Pendaftaran</button>
                            </div>

                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="js/ppdb.js"></script>
</body>
</html>
